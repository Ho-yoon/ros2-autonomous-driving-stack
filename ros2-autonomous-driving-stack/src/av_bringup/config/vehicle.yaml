vehicle:
  # Platform: generic passenger car
  wheelbase: 2.7          # metres
  track_width: 1.6        # metres
  max_steering_angle: 0.6 # radians (~34 deg)
  max_speed: 15.0         # m/s
  max_acceleration: 3.0   # m/s^2
  max_deceleration: 6.0   # m/s^2 (braking)

  # CAN configuration
  can_interface: "can0"
  can_bitrate: 500000     # 500 kbps

  # Geometry offsets (from base_link)
  lidar_offset:  [1.5, 0.0, 1.8]   # [x, y, z] metres
  camera_offset: [1.8, 0.0, 1.4]
  imu_offset:    [0.0, 0.0, 0.5]
  gnss_offset:   [0.0, 0.0, 1.9]
