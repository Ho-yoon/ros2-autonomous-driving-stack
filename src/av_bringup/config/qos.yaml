# QoS profiles for all inter-package topics.
# reliability: RELIABLE | BEST_EFFORT
# durability:  VOLATILE  | TRANSIENT_LOCAL
# history:     KEEP_LAST | KEEP_ALL
# depth:       integer (only used with KEEP_LAST)

qos_profiles:
  sensing_lidar:
    reliability: BEST_EFFORT
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       5

  sensing_camera:
    reliability: BEST_EFFORT
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       3

  sensing_imu:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       10

  sensing_gnss:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       5

  localization_pose:
    reliability: RELIABLE
    durability:  TRANSIENT_LOCAL
    history:     KEEP_LAST
    depth:       1

  localization_odom:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       10

  perception_objects:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       10

  planning_trajectory:
    reliability: RELIABLE
    durability:  TRANSIENT_LOCAL
    history:     KEEP_LAST
    depth:       1

  control_cmd:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       5

  vehicle_command:
    reliability: RELIABLE
    durability:  VOLATILE
    history:     KEEP_LAST
    depth:       1
