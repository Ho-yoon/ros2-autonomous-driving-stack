lidar:
  topic_raw: "/sensing/lidar_raw"
  topic_out: "/sensing/lidar_points"
  voxel_leaf_size: 0.1    # metres
  min_range: 0.5          # metres
  max_range: 100.0        # metres
  publish_rate: 10.0      # Hz

camera:
  topic_raw: "/sensing/camera_raw"
  topic_out: "/sensing/camera_image"
  image_width: 1280
  image_height: 720
  publish_rate: 30.0      # Hz
  # Intrinsic matrix (fx, fy, cx, cy) — replace with calibrated values
  fx: 900.0
  fy: 900.0
  cx: 640.0
  cy: 360.0

imu:
  topic_raw: "/sensing/imu_raw"
  topic_out: "/sensing/imu"
  publish_rate: 100.0     # Hz
  accel_noise_density: 0.004
  gyro_noise_density:  0.0002

gnss:
  topic_raw: "/sensing/gnss_raw"
  topic_out: "/sensing/gnss"
  publish_rate: 10.0      # Hz
